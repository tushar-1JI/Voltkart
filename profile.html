<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Profile | Voltkart</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>

<body>
  <div id="app-header"></div>
  <main>
    <div class="profile-layout">
      <div class="profile-card" id="profileCard"></div>
      <div class="profile-card" id="editCard" style="display:none">
        <h3 style="margin-bottom:16px">✏️ Edit Profile</h3>
        <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="editPhone"></div>
        <div class="form-group"><label>Address</label><textarea id="editAddress" rows="3"></textarea></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-accent btn-sm" onclick="saveProfile()">💾 Save</button>
          <button class="btn btn-outline btn-sm" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>
      <div class="profile-card">
        <h3 style="margin-bottom:16px">📦 Order History</h3>
        <div id="orderHistory"></div>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    initPage('profile');
    if (!DB.isLoggedIn()) { window.location = 'login.html'; throw ''; }

    const s = DB.session();
    const u = DB.getUser(s.id);

    function renderProfile() {
      const u = DB.getUser(s.id);
      document.getElementById('profileCard').innerHTML = `
        <div class="profile-avatar">${u.name[0]}</div>
        <h2>${u.name}</h2>
        <div class="email">${u.email}</div>
        <div style="color:var(--text2);font-size:.85rem;margin-bottom:4px">📱 ${u.phone || 'Not set'}</div>
        <div style="color:var(--text2);font-size:.85rem;margin-bottom:16px">📍 ${u.address || 'No address set'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="startEdit()">✏️ Edit Profile</button>
          <button class="btn btn-sm" style="background:var(--bg3);color:var(--text)" onclick="doLogout()">🚪 Logout</button>
          ${u.role === 'admin' ? '<a href="admin.html" class="btn btn-sm" style="background:var(--accent);color:#000">⚙️ Admin Panel</a>' : ''}
        </div>`;

      // Orders
      const orders = DB.getUserOrders(s.id);
      if (!orders.length) {
        document.getElementById('orderHistory').innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px">No orders yet. <a href="listing.html" style="color:var(--accent)">Start shopping!</a></div>';
        return;
      }
      document.getElementById('orderHistory').innerHTML = orders.sort((a, b) => b.placedAt - a.placedAt).map(o => `
        <div class="order-history-item" onclick="window.location='tracking.html?id=${o.id}'">
          <div>
            <div style="font-weight:600">${o.id}</div>
            <div style="font-size:.8rem;color:var(--text2)">${o.items.length} items • ${new Date(o.placedAt).toLocaleDateString()}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700">₹${o.total}</div>
            <span class="status-badge status-${o.status}">${o.status.replace(/_/g, ' ').toUpperCase()}</span>
          </div>
        </div>`
      ).join('');
    }

    function startEdit() {
      const u = DB.getUser(s.id);
      document.getElementById('editName').value = u.name;
      document.getElementById('editPhone').value = u.phone || '';
      document.getElementById('editAddress').value = u.address || '';
      document.getElementById('editCard').style.display = '';
    }
    function cancelEdit() { document.getElementById('editCard').style.display = 'none'; }
    function saveProfile() {
      DB.updateUser(s.id, {
        name: document.getElementById('editName').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        address: document.getElementById('editAddress').value.trim()
      });
      showToast('✅ Profile updated!');
      cancelEdit(); renderProfile(); renderHeader();
    }
    function doLogout() { DB.logout(); window.location = 'index.html'; }

    renderProfile();
  </script>
</body>

</html>
